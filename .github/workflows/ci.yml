name: CI

on:
  pull_request:
  push:
    branches: [main]

# A superseded push cancels the still-running verdict for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      # Coverage is information, not a gate: the text summary lands in the log,
      # the HTML report in the artifact. No thresholds on purpose.
      - run: npm run coverage
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven
      # verify with the pom defaults: unit + @QuarkusTest suites; ITs stay skipped
      # (skipITs=true). Postgres + Keycloak dev-services run on the runner's Docker.
      # JaCoCo report (plain unit + @QuarkusTest merged) falls out of verify.
      - run: ./mvnw -B verify -Dquarkus.analytics.disabled=true
      - uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/target/jacoco-report/
