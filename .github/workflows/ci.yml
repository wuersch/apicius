name: CI

on:
  pull_request:
  push:
    branches: [main]

# A superseded push cancels the still-running verdict for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx vitest run
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven
      # verify with the pom defaults: unit + @QuarkusTest suites; ITs stay skipped
      # (skipITs=true). Postgres + Keycloak dev-services run on the runner's Docker.
      - run: ./mvnw -B verify -Dquarkus.analytics.disabled=true
