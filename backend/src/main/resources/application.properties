# API base path (ADR-0002)
quarkus.rest.path=/api/v1

# Phase 1 schema management: Hibernate drop-and-create in dev/test only; prod defaults
# to no schema management until Flyway lands (ADR-0004) — never drop a prod database.
%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# Code-first OpenAPI document metadata (ADR-0002)
quarkus.smallrye-openapi.info-title=Apicius API
quarkus.smallrye-openapi.info-version=1.0.0

# OIDC (ADR-0005): bearer-only resource server; issuer/audience/JWKS are configuration,
# never code, so any OIDC-compliant IdP works through the same path (FEAT-001 AC5).
quarkus.oidc.application-type=service

# %dev: Keycloak Dev Services, pinned so the SPA (separate Vite process) can address it,
# seeded with the apicius realm (public PKCE client + dev users ada/ada, grace/grace).
%dev.quarkus.keycloak.devservices.port=8180
%dev.quarkus.keycloak.devservices.realm-path=dev-realm.json

# %test: @TestSecurity/@OidcSecurity fake the identity; no Keycloak container and no
# OIDC tenant needed — @Authenticated still rejects anonymous requests with 401.
%test.quarkus.keycloak.devservices.enabled=false
%test.quarkus.oidc.enabled=false

# Demo seed data is a dev convenience only (FEAT-002): in dev, Quarkus picks up import.sql by
# default; tests must start empty (row-count assertions) so the script is disabled there, and
# prod never loads a seed script — explicit, though it is also the Quarkus prod default.
%test.quarkus.hibernate-orm.sql-load-script=no-file
%prod.quarkus.hibernate-orm.sql-load-script=no-file

# Hibernate statistics let tests prove list views never hydrate entities (FEAT-002 AC5).
%test.quarkus.hibernate-orm.statistics=true

# %prod: the IdP (e.g. Entra ID) is injected at deploy time.
%prod.quarkus.oidc.auth-server-url=${OIDC_ISSUER_URL}
%prod.quarkus.oidc.token.audience=${OIDC_AUDIENCE}
